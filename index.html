<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>🍜 附近餐厅 - 高德 JSAPI v2.0</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "PingFang SC", sans-serif; }
    #container { position: absolute; top: 0; left: 0; right: 320px; bottom: 0; }
    #sidebar {
      position: absolute; top: 0; right: 0; width: 320px; bottom: 0;
      background: #f8f9fa; border-left: 1px solid #e0e0e0;
      overflow-y: auto; padding: 0;
    }
    #header {
      padding: 16px 20px; background: #fff;
      border-bottom: 1px solid #e0e0e0;
      position: sticky; top: 0; z-index: 10;
    }
    #header h1 { margin: 0 0 8px; font-size: 18px; color: #1a1a1a; }
    #header .count { color: #666; font-size: 13px; }
    #header .count b { color: #ff5722; font-size: 16px; }
    .controls { display: flex; gap: 8px; margin-top: 12px; }
    .controls input, .controls button {
      flex: 1; padding: 8px 12px; border-radius: 6px;
      border: 1px solid #ddd; font-size: 13px;
    }
    .controls button {
      background: #ff5722; color: #fff; border: none;
      cursor: pointer; font-weight: 600;
    }
    .controls button:hover { background: #e64a19; }
    .controls button:disabled { background: #ccc; cursor: not-allowed; }
    .item {
      padding: 14px 20px; background: #fff;
      border-bottom: 1px solid #f0f0f0; cursor: pointer;
      transition: background 0.2s;
    }
    .item:hover { background: #fff3e0; }
    .item.active { background: #ffe0b2; border-left: 3px solid #ff5722; }
    .item .name {
      font-weight: 600; color: #1a1a1a; font-size: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .item .name .idx {
      background: #ff5722; color: #fff; font-size: 11px;
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .item .addr { color: #666; font-size: 12px; margin-top: 4px; }
    .item .meta { color: #999; font-size: 11px; margin-top: 4px; }
    .item .meta span { margin-right: 8px; }
    #status {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; z-index: 1000; max-width: 60%;
    }
    #status.ok { background: rgba(46, 184, 131, 0.95); }
    #status.err { background: rgba(220, 53, 69, 0.95); }
    .empty, .loading {
      padding: 40px 20px; text-align: center; color: #999;
      font-size: 13px;
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="sidebar">
    <div id="header">
      <h1>🍜 附近餐厅</h1>
      <div class="count">1km 内共 <b id="count">-</b> 家</div>
      <div class="controls">
        <input id="keyword" value="餐厅" placeholder="搜索关键词..." />
        <button id="searchBtn">🔍 搜索</button>
      </div>
    </div>
    <div id="list">
      <div class="loading">📍 正在获取位置...</div>
    </div>
  </div>
  <div id="status">⏳ 正在加载地图...</div>

  <script>
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const keywordInput = document.getElementById('keyword');
    const searchBtn = document.getElementById('searchBtn');
    
    function showStatus(msg, type) {
      statusEl.className = type || '';
      statusEl.innerHTML = msg;
    }
    
    let map, userMarker, markers = [], infoWindow;
    let userLocation = null;
    
    // 1. 加载地图
    window._AMapSecurityConfig = {
      securityJsCode: '067a3981b4df13aef915e17b57d627b4',
    };
    
    AMapLoader.load({
      key: 'c5945a9c3fbdc392c723509e72cbba2f',
      version: '2.0',
      plugins: ['AMap.Scale', 'AMap.ToolBar', 'AMap.Geolocation', 'AMap.PlaceSearch', 'AMap.InfoWindow'],
    }).then((AMap) => {
      AMap.getConfig().appname = 'amap-jsapi-skill-restaurant';
      
      map = new AMap.Map('container', {
        viewMode: '2D',
        zoom: 14,
        center: [121.473, 31.230],
      });
      
      map.addControl(new AMap.Scale());
      map.addControl(new AMap.ToolBar());
      infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -32) });
      
      // 2. 自动获取用户位置
      showStatus('📍 正在获取你的位置...', '');
      map.plugin('AMap.Geolocation', () => {
        const geolocation = new AMap.Geolocation({
          enableHighAccuracy: true,
          timeout: 10000,
          buttonPosition: 'RB',
        });
        geolocation.getCurrentPosition((status, result) => {
          if (status === 'complete') {
            userLocation = [result.position.lng, result.position.lat];
            showStatus('✅ 位置获取成功: ' + result.formattedAddress, 'ok');
            setTimeout(() => { showStatus('', ''); statusEl.style.display='none'; }, 3000);
            addUserMarker(userLocation);
            map.setCenter(userLocation);
            search();
          } else {
            showStatus('⚠️ 定位失败，使用默认位置（上海外滩）', 'err');
            userLocation = [121.473, 31.230];
            addUserMarker(userLocation);
            setTimeout(() => { showStatus('', ''); statusEl.style.display='none'; }, 3000);
            search();
          }
        });
      });
      
    }).catch((e) => {
      showStatus('❌ 地图加载失败: ' + (e.message || e), 'err');
    });
    
    function addUserMarker(loc) {
      if (userMarker) map.remove(userMarker);
      userMarker = new AMap.Marker({
        position: loc,
        icon: new AMap.Icon({
          size: new AMap.Size(25, 25),
          image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
          imageSize: new AMap.Size(25, 25),
        }),
        offset: new AMap.Pixel(-12, -12),
        title: '我的位置',
      });
      map.add(userMarker);
    }
    
    // 3. 搜索附近餐厅
    function search() {
      const keyword = keywordInput.value || '餐厅';
      searchBtn.disabled = true;
      searchBtn.textContent = '⏳ 搜索中...';
      listEl.innerHTML = '<div class="loading">🔍 正在搜索...</div>';
      
      // 清除旧 marker
      markers.forEach(m => map.remove(m));
      markers = [];
      
      AMap.plugin('AMap.PlaceSearch', () => {
        const placeSearch = new AMap.PlaceSearch({
          type: '餐饮',
          pageSize: 30,
          pageIndex: 1,
          city: '全国',
          autoFitView: false,
        });
        placeSearch.searchNearBy(keyword, userLocation, 1000, (status, result) => {
          searchBtn.disabled = false;
          searchBtn.textContent = '🔍 搜索';
          if (status === 'complete' && result.poiList) {
            renderResults(result.poiList.pois);
          } else if (status === 'no_data') {
            listEl.innerHTML = '<div class="empty"><div class="icon">😢</div>没找到，换个关键词试试？</div>';
            countEl.textContent = '0';
          } else {
            listEl.innerHTML = '<div class="empty"><div class="icon">⚠️</div>搜索失败</div>';
          }
        });
      });
    }
    
    function renderResults(pois) {
      countEl.textContent = pois.length;
      if (pois.length === 0) {
        listEl.innerHTML = '<div class="empty"><div class="icon">😢</div>没找到餐厅</div>';
        return;
      }
      
      listEl.innerHTML = pois.map((poi, i) => {
        const dist = poi.distance ? (poi.distance > 1000 ? (poi.distance/1000).toFixed(2)+'km' : poi.distance+'m') : '';
        return `
          <div class="item" data-i="${i}">
            <div class="name"><span class="idx">${i+1}</span>${poi.name}</div>
            <div class="addr">📍 ${poi.address || '-'}</div>
            <div class="meta">
              ${dist ? '<span>📏 '+dist+'</span>' : ''}
              ${poi.tel ? '<span>📞 '+poi.tel+'</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
      
      // 加 marker
      pois.forEach((poi, i) => {
        const marker = new AMap.Marker({
          position: poi.location,
          title: poi.name,
          label: { content: (i+1)+'', direction: 'center' },
          extData: { idx: i, poi: poi },
        });
        marker.on('click', () => selectItem(i));
        markers.push(marker);
      });
      map.add(markers);
      
      // 绑定列表点击
      listEl.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', () => selectItem(parseInt(el.dataset.i)));
      });
    }
    
    function selectItem(idx) {
      // 高亮列表项
      listEl.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
      const active = listEl.querySelector(`.item[data-i="${idx}"]`);
      if (active) {
        active.classList.add('active');
        active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      
      // 飞到对应位置
      const marker = markers[idx];
      if (marker) {
        map.setCenter(marker.getPosition());
        map.setZoom(17);
        const poi = marker.getExtData().poi;
        const dist = poi.distance ? (poi.distance > 1000 ? (poi.distance/1000).toFixed(2)+'km' : poi.distance+'m') : '';
        infoWindow.setContent(`
          <div style="padding:8px;font-size:13px;line-height:1.6;">
            <div style="font-weight:600;font-size:15px;margin-bottom:6px;">${poi.name}</div>
            <div>📍 ${poi.address || '-'}</div>
            ${dist ? '<div>📏 距离 '+dist+'</div>' : ''}
            ${poi.tel ? '<div>📞 '+poi.tel+'</div>' : ''}
          </div>
        `);
        infoWindow.open(map, marker.getPosition());
      }
    }
    
    // 4. 搜索按钮
    searchBtn.addEventListener('click', search);
    keywordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>高德地图 JSAPI v2.0 - 基础地图（Debug 版）</title>
  <style>
    html, body, #container { margin: 0; padding: 0; width: 100%; height: 100%; }
    #status {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-family: -apple-system, "PingFang SC", sans-serif;
      font-size: 13px; z-index: 1000; max-width: 80%;
      line-height: 1.6;
    }
    #status.ok { background: rgba(46, 184, 131, 0.95); }
    #status.err { background: rgba(220, 53, 69, 0.95); }
    #status code { background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="status">⏳ 正在加载高德地图 JSAPI...</div>
  <div id="container"></div>

  <script>
    const status = document.getElementById('status');
    function show(msg, type) {
      status.className = type || '';
      status.innerHTML = msg;
    }

    // 捕获全局错误
    window.addEventListener('error', (e) => {
      show('❌ <b>JS 错误:</b> ' + e.message + '<br><small>' + (e.filename || '') + ':' + e.lineno + '</small>', 'err');
    });

    // 捕获未处理的 Promise 拒绝
    window.addEventListener('unhandledrejection', (e) => {
      show('❌ <b>Promise 错误:</b> ' + (e.reason && e.reason.message || e.reason), 'err');
    });
  </script>

  <script src="https://webapi.amap.com/loader.js"></script>
  <script>
    console.log('1️⃣ loader.js 加载完成');
    window._AMapSecurityConfig = {
      securityJsCode: '5190b7e1a6820e9fa98504c3d85f4031',
    };
    console.log('2️⃣ 安全密钥已配置');

    AMapLoader.load({
      key: '9f55d6b367370ab394fb4d00590b33aa',
      version: '2.0',
      plugins: ['AMap.Scale', 'AMap.ToolBar', 'AMap.ControlBar'],
    }).then((AMap) => {
      console.log('3️⃣ AMapLoader 成功');
      AMap.getConfig().appname = 'amap-jsapi-skill';

      const map = new AMap.Map('container', {
        viewMode: '3D',
        zoom: 11,
        center: [121.473, 31.230],
        pitch: 30,
      });

      map.addControl(new AMap.Scale());
      map.addControl(new AMap.ToolBar());
      map.addControl(new AMap.ControlBar());

      show('✅ <b>地图加载成功！</b><br>中心点: 上海外滩 | Key: <code>9f55...33aa</code><br>👉 现在可以拖动、缩放、3D 旋转看看效果', 'ok');
      console.log('4️⃣ 地图实例化完成');
    }).catch((e) => {
      console.error('AMapLoader 失败:', e);
      const msg = e && (e.message || e.toString()) || '未知错误';
      const errInfo = e && e.errInfo ? '<br><small>高德错误码: ' + JSON.stringify(e.errInfo) + '</small>' : '';
      show('❌ <b>地图加载失败</b><br>' + msg + errInfo + '<br><br>🔧 <b>可能原因:</b><br>1. Key 无效或被禁用<br>2. 安全密钥 (securityJsCode) 不匹配<br>3. Key 未添加域名白名单（GitHub Pages 域名需要加白名单）<br>4. 跨域 CORS 问题', 'err');
    });
  </script>
</body>
</html>
